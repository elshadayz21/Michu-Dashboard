<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metabase Dashboard</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #fff;
      -webkit-overflow-scrolling: touch;
    }
    iframe {
      display: block;
      border: none;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
  <iframe
    id="mbFrame"
    src="https://metabase.michu.com.et/public/dashboard/14c647bf-d063-49d9-b868-41b53b4334fa?tab=24-michu-all"
    allow="fullscreen"
    allowfullscreen
    loading="eager"
    referrerpolicy="no-referrer-when-downgrade"
  ></iframe>

  <script>
    (function() {
      function refreshFrame() {
        var frame = document.getElementById('mbFrame');
        if (frame && frame.src) {
          var base = frame.src.split('&_t=')[0];
          frame.src = base + '&_t=' + Date.now();
        }
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
          setInterval(refreshFrame, 300000);
        });
      } else {
        setInterval(refreshFrame, 300000);
      }
    })();
  </script>
</body>
</html>
