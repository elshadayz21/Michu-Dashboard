<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Metabase Dashboard</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }
    iframe {
      border: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <iframe 
    src="https://metabase.michu.com.et/public/dashboard/14c647bf-d063-49d9-b868-41b53b4334fa?tab=24-michu-all" 
    allowfullscreen>
  </iframe>

  <script>
    // Auto-refresh iframe every 5 minutes (300000 ms)
    setInterval(() => {
      const iframe = document.querySelector('iframe');
      iframe.src = iframe.src;
    }, 300000);
  </script>
</body>
</html>
